<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pinterest Pastel Theme</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --blush:    #f5d5d5;
      --rose:     #e8a5a5;
      --petal:    #fce8e8;
      --cream:    #fdf6f0;
      --beige:    #f0e6d8;
      --sand:     #ddd0bf;
      --white:    #fffcfa;
      --text:     #6b4f4f;
      --text-light: #a68b8b;
      --accent:   #c97b7b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      min-height: 360px;
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
      position: relative;
    }

    /* Decorative background blobs */
    body::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, var(--blush) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: -40px;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, var(--beige) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 28px 24px 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--rose) 0%, var(--blush) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(200, 120, 120, 0.25);
      flex-shrink: 0;
    }

    .logo svg {
      width: 22px;
      height: 22px;
      fill: white;
    }

    .header-text h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.01em;
      line-height: 1.1;
    }

    .header-text span {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Status pill */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--petal);
      border: 1px solid var(--blush);
      border-radius: 16px;
      padding: 10px 16px;
      margin-bottom: 20px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    .status-text {
      font-size: 12px;
      color: var(--text);
      font-weight: 400;
      flex: 1;
      margin-left: 10px;
    }

    .toggle {
      position: relative;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--sand);
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .toggle input:checked + .slider {
      background: linear-gradient(135deg, var(--rose), var(--accent));
    }

    .toggle input:checked + .slider::before {
      transform: translateX(16px);
    }

    /* Color palette preview */
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 400;
      font-style: italic;
      color: var(--text-light);
      margin-bottom: 12px;
      letter-spacing: 0.04em;
    }

    .palette {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .swatch {
      flex: 1;
      height: 36px;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.8);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease;
    }

    .swatch:hover {
      transform: translateY(-2px);
    }

    .swatch::after {
      content: attr(data-name);
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: var(--text-light);
      white-space: nowrap;
      transition: bottom 0.2s ease;
    }

    .swatch:hover::after {
      bottom: 4px;
    }

    .swatch-1 { background: #f5d5d5; }
    .swatch-2 { background: #fce8e8; }
    .swatch-3 { background: #fdf6f0; }
    .swatch-4 { background: #f0e6d8; }
    .swatch-5 { background: #fffcfa; }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--blush), transparent);
      margin: 18px 0;
    }

    /* Feature tags */
    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }

    .tag {
      font-size: 11px;
      padding: 4px 10px;
      background: var(--cream);
      border: 1px solid var(--beige);
      border-radius: 20px;
      color: var(--text-light);
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 10px;
      color: var(--text-light);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .footer em {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 12px;
      text-transform: none;
      letter-spacing: 0.02em;
      color: var(--rose);
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0C5.373 0 0 5.373 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 0 1 .083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Pastel Theme</h1>
        <span>voor Pinterest</span>
      </div>
    </div>

    <!-- Status + Toggle -->
    <div class="status-bar">
      <div class="status-dot"></div>
      <span class="status-text">Thema actief op Pinterest</span>
      <label class="toggle">
        <input type="checkbox" id="themeToggle" checked />
        <span class="slider"></span>
      </label>
    </div>

    <!-- Palette preview -->
    <p class="section-title">Kleurenpalet</p>
    <div class="palette">
      <div class="swatch swatch-1" data-name="Blush"></div>
      <div class="swatch swatch-2" data-name="Petal"></div>
      <div class="swatch swatch-3" data-name="Cream"></div>
      <div class="swatch swatch-4" data-name="Beige"></div>
      <div class="swatch swatch-5" data-name="White"></div>
    </div>

    <div class="divider"></div>

    <!-- Feature tags -->
    <p class="section-title">Wat wordt aangepast</p>
    <div class="features">
      <span class="tag">✦ Achtergronden</span>
      <span class="tag">✦ Navigatiebalk</span>
      <span class="tag">✦ Knoppen</span>
      <span class="tag">✦ Zijbalk</span>
      <span class="tag">✦ Iconen</span>
      <span class="tag">✦ Tekst</span>
    </div>

    <!-- Footer -->
    <div class="footer">
      <em>zachte tinten, zachte dromen</em>
    </div>

  </div>

  <script>
    const toggle = document.getElementById('themeToggle');
    const dot = document.querySelector('.status-dot');
    const statusText = document.querySelector('.status-text');

    // Load saved state
    chrome?.storage?.local?.get(['themeEnabled'], (result) => {
      const enabled = result.themeEnabled !== false;
      toggle.checked = enabled;
      updateStatus(enabled);
    });

    toggle.addEventListener('change', () => {
      const enabled = toggle.checked;
      chrome?.storage?.local?.set({ themeEnabled: enabled });
      updateStatus(enabled);
    });

    function updateStatus(enabled) {
      if (enabled) {
        dot.style.background = 'var(--accent)';
        dot.style.animation = 'pulse 2.4s ease-in-out infinite';
        statusText.textContent = 'Thema actief op Pinterest';
      } else {
        dot.style.background = 'var(--sand)';
        dot.style.animation = 'none';
        statusText.textContent = 'Thema uitgeschakeld';
      }
    }
  </script>
</body>
</html>
